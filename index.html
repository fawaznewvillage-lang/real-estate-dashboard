<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم العقارية</title>
  <style>
    body{
      margin:0;
      font-family:Tahoma, Arial, sans-serif;
      background:#f5f6fa;
      direction:rtl;
      color:#1f2937;
    }

    header{
      background:linear-gradient(135deg,#111827,#374151);
      color:#fff;
      padding:24px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      box-shadow:0 2px 12px rgba(0,0,0,0.15);
    }

    .container{
      width:94%;
      max-width:1200px;
      margin:24px auto;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-bottom:22px;
    }

    .stat{
      background:#fff;
      padding:22px;
      text-align:center;
      border-radius:14px;
      box-shadow:0 3px 12px rgba(0,0,0,0.08);
      font-size:20px;
      font-weight:bold;
    }

    .card{
      background:#fff;
      padding:22px;
      margin-bottom:20px;
      border-radius:14px;
      box-shadow:0 3px 12px rgba(0,0,0,0.08);
    }

    .card h2{
      margin:0 0 14px;
      font-size:24px;
      color:#111827;
    }

    .note{
      background:#fff8e1;
      color:#7c5a00;
      padding:14px 16px;
      border-radius:10px;
      margin-bottom:18px;
      font-size:15px;
      line-height:1.9;
    }

    .buttons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .btn{
      display:inline-block;
      background:#111827;
      color:#fff;
      text-decoration:none;
      padding:13px 20px;
      border-radius:10px;
      font-size:16px;
      font-weight:bold;
      transition:0.2s ease;
    }

    .btn:hover{
      background:#374151;
      transform:translateY(-1px);
    }

    .section-title{
      font-size:18px;
      font-weight:bold;
      margin:10px 0 14px;
      color:#374151;
    }

    .footer{
      text-align:center;
      color:#6b7280;
      font-size:14px;
      margin-top:18px;
      padding-bottom:20px;
    }
  </style>
</head>
<body>

  <header>لوحة إدارة العقار</header>

  <div class="container">

    <div class="stats">
      <div class="stat">📊 المشاريع</div>
      <div class="stat">👥 العملاء</div>
      <div class="stat">📈 الطلبات</div>
    </div>

    <div class="card">
      <h2>قاعدة البيانات العقارية</h2>

      <div class="note">
        اختر القسم الذي تريد فتحه مباشرة من الأزرار التالية.
      </div>

      <div class="section-title">الوصول السريع</div>

      <div class="buttons">
        <a class="btn" target="_blank" href="https://docs.google.com/spreadsheets/d/17PjsCjDlWEdbuaYcB4EqOR-Eiw05Ng7DTrY6cyDd_l0/edit#gid=133223794">فتح المشاريع</a>
        <a class="btn" target="_blank" href="https://docs.google.com/spreadsheets/d/17PjsCjDlWEdbuaYcB4EqOR-Eiw05Ng7DTrY6cyDd_l0/edit#gid=1551169871">فتح العملاء</a>
        <a class="btn" target="_blank" href="https://docs.google.com/spreadsheets/d/17PjsCjDlWEdbuaYcB4EqOR-Eiw05Ng7DTrY6cyDd_l0/edit">فتح ملف Google Sheets</a>
      </div>
    </div>

    <div class="footer">
      لوحة تحكم عقارية مرتبطة بنظام واتساب + n8n + Google Sheets
    </div>

  </div>

</body>
</html>
